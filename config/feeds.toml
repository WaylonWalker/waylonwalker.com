# Archive feed - all published posts, newest first
[[markata-go.feeds]]
slug = "archive"
title = "Archive"
description = "All published posts"
filter = "date<=today and (templateKey == 'blog-post' or templateKey == 'til' or templateKey == 'thoughts' or templateKey == 'stars' or templateKey == 'daily' or templateKey == 'shots' or templateKey == 'ping') and published and 'family' not in tags"
sort = "date"
primary = true
reverse = true
items_per_page = 50
pagination_type = "htmx"

# Blog feed - full blog posts only
[[markata-go.feeds]]
slug = "blog"
title = "Blog"
description = "Full Blog Posts"
filter = "published == true and templateKey == \"blog-post\""
sort = "date"
reverse = true
primary = true

[[markata-go.feeds]]
slug = "ping"
title = "ping"
description = "Short Ping Posts"
filter = "published == true and templateKey == \"ping\""
sort = "date"
reverse = true
primary = true

# TIL feed - Today I Learned posts
[[markata-go.feeds]]
slug = "til-feed"
title = "Today I Learned"
description = "Short TIL posts"
filter = "published == true and templateKey == \"til\" and slug != \"til\""
sort = "date"
reverse = true
primary = true

# All thoughts (local + imported from thoughts.waylonwalker.com)
[[markata-go.feeds]]
slug = "thoughts-feed"
title = "Thoughts"
description = "Link based \"commentary\" style posts, commenting on a web link"
filter = "published == true and (template == 'thought.html' or path.startswith('pages/thoughts/') or path.startswith('thoughts/') or (template == 'link' and ('thought' in tags or 'thoughts' in tags)))"
sort = "date"
reverse = true
items_per_page = 50
primary = true

# Pings - short social posts
[[markata-go.feeds]]
slug = "pings"
title = "Pings"
description = "Short to medium social media style posts"
filter = "published == true and templateKey == \"ping\" and \"family\" not in tags"
sort = "date"
reverse = true
primary = true

# Shots feed - photo/video posts
[[markata-go.feeds]]
slug = "shots"
title = "Shots"
description = "Photo and video posts"
filter = "templateKey == \"shots\""
sort = "date"
reverse = true
primary = true

# All posts feed (same as archive but at /all/)
[[markata-go.feeds]]
slug = "all"
title = "All Posts"
description = "An unpaginated list of every published post"
robots = "noindex,follow"
filter = "date<=today and (templateKey == 'blog-post' or templateKey == 'til' or templateKey == 'thoughts' or templateKey == 'stars' or templateKey == 'daily' or templateKey == 'shots' or templateKey == 'ping') and published and 'family' not in tags"
sort = "date"
reverse = true
items_per_page = 10000

# Daily notes feed
[[markata-go.feeds]]
slug = "daily"
title = "Daily Notes"
description = "Daily notes posts"
filter = "templateKey == \"daily\""
sort = "date"
reverse = true

# Steam feed
[[markata-go.feeds]]
slug = "steam"
title = "Steam"
description = "Steam posts"
filter = "published == true and 'steam-game' in tags"
sort = "date"
reverse = true

# Draft posts - unpublished or future dated
[[markata-go.feeds]]
slug = "draft"
title = "Drafts"
description = "Draft and unpublished posts"
robots = "noindex,follow"
filter = "published == false or date > today"
sort = "date"
reverse = true

# Family shots - photos tagged with family
[[markata-go.feeds]]
slug = "family-shots"
title = "Family Shots"
description = "Family photo posts"
filter = "templateKey == \"shots\" and \"family\" in tags"
sort = "date"
reverse = true
private = true

# Published feed
[[markata-go.feeds]]
slug = "published"
title = "Published"
description = "All published posts"
