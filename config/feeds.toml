# Archive feed - all published posts, newest first
[[markata-go.feeds]]
slug = "archive"
title = "Archive"
description = "All published posts"
filter = """
  date<=today and (
    path.startswith('pages/blog/') or
    path.startswith('pages/til/') or
    path.startswith('pages/thoughts/') or
    path.startswith('pages/stars/') or
    path.startswith('pages/daily/') or
    path.startswith('pages/shots/') or
    path.startswith('pages/ping/')
  ) 
  and published and 'family' not in tags
  """
sort = "date"
reverse = true
primary = true
items_per_page = 50
pagination_type = "htmx"
sidebar=true

# Blog feed - full blog posts only
[[markata-go.feeds]]
slug = "blog"
title = "Blog"
description = "Full Blog Posts"
filter = "published == true and path.startswith('pages/blog/')"
sort = "date"
reverse = true
primary = true
sidebar=true

[[markata-go.feeds]]
slug = "ping"
title = "ping"
description = "Short Ping Posts"
filter = "published == true and path.startswith('pages/ping/')"
sort = "date"
reverse = true
primary = true
sidebar=true

# TIL feed - Today I Learned posts
[[markata-go.feeds]]
slug = "til"
title = "Today I Learned"
description = "Short TIL posts"
filter = "published == true and path.startswith('pages/til/') and slug != 'til'"
sort = "date"
reverse = true
primary = true
sidebar=true

# All thoughts (local + imported from thoughts.waylonwalker.com)
[[markata-go.feeds]]
slug = "thoughts-feed"
title = "Thoughts"
description = "Link based \"commentary\" style posts, commenting on a web link"
filter = "published == true and (template == 'thought.html' or path.startswith('pages/thoughts/') or path.startswith('thoughts/') or (template == 'link' and ('thought' in tags or 'thoughts' in tags)))"
sort = "date"
reverse = true
items_per_page = 50
primary = true
sidebar=true

# Pings - short social posts
[[markata-go.feeds]]
slug = "pings"
title = "Pings"
description = "Short to medium social media style posts"
filter = "published == true and path.startswith('pages/ping/') and \"family\" not in tags"
sort = "date"
reverse = true
primary = true
sidebar=true

# Shots feed - photo/video posts
[[markata-go.feeds]]
slug = "shots"
title = "Shots"
description = "Photo and video posts"
filter = "path.startswith('pages/shots/')"
sort = "date"
reverse = true
primary = true
items_per_page = 50
sidebar=true

[markata-go.feeds.templates]
html = "feed-photo-grid.html"

# All posts feed (same as archive but at /all/)
[[markata-go.feeds]]
slug = "all"
title = "All Posts"
description = "An unpaginated list of every published post"
robots = "noindex,follow"
filter = """
  date<=today and (
    path.startswith('pages/blog/') or
    path.startswith('pages/til/') or
    path.startswith('pages/thoughts/') or
    path.startswith('pages/stars/') or
    path.startswith('pages/daily/') or
    path.startswith('pages/shots/') or
    path.startswith('pages/ping/')
  ) and published and 'family' not in tags
  """
sort = "date"
reverse = true
items_per_page = 10000
sidebar=true

